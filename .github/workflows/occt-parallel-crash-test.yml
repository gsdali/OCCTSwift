name: OCCT Parallel Crash Reproducer

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - macos
          - both

jobs:
  test-windows:
    if: inputs.platform == 'windows' || inputs.platform == 'both'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Build OCCT from source as static libraries.
      # Key settings:
      #   - INSTALL_DIR (not CMAKE_INSTALL_PREFIX) is OCCT's own install path variable
      #   - INSTALL_DIR_LAYOUT=Unix gives: include/opencascade/ and lib/ (no platform subdirs)
      #   - RelWithDebInfo appends 'i' to lib dir name: libi/
      #   - CMake default MSVC runtime is /MD (dynamic CRT) — our test must match
      - name: Build OCCT from source
        run: |
          git clone --depth 1 --branch V8_0_0_rc5 https://github.com/Open-Cascade-SAS/OCCT.git occt-src
          mkdir occt-build
          cd occt-build
          cmake ..\occt-src -G "Visual Studio 17 2022" -A x64 `
            -DBUILD_LIBRARY_TYPE=Static `
            -DBUILD_MODULE_ApplicationFramework=OFF `
            -DBUILD_MODULE_DataExchange=OFF `
            -DBUILD_MODULE_Draw=OFF `
            -DBUILD_MODULE_FoundationClasses=ON `
            -DBUILD_MODULE_ModelingAlgorithms=ON `
            -DBUILD_MODULE_ModelingData=ON `
            -DBUILD_MODULE_Visualization=OFF `
            -DUSE_FREETYPE=OFF -DUSE_FREEIMAGE=OFF -DUSE_TBB=OFF `
            -DUSE_VTK=OFF -DUSE_OPENGL=OFF -DUSE_GLES2=OFF `
            -DUSE_DRACO=OFF -DUSE_FFMPEG=OFF -DUSE_OPENVR=OFF `
            -DUSE_XLIB=OFF -DUSE_TCL=OFF -DUSE_RAPIDJSON=OFF `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DINSTALL_DIR="$env:GITHUB_WORKSPACE\occt-install" `
            -DINSTALL_DIR_LAYOUT=Unix
          cmake --build . --config RelWithDebInfo --parallel $env:NUMBER_OF_PROCESSORS
          cmake --install . --config RelWithDebInfo
        shell: pwsh
        timeout-minutes: 60

      # Verify the install tree has the expected files
      - name: Verify install
        run: |
          $hxx = Get-ChildItem -Recurse occt-install -Filter "Extrema_ExtElCS.hxx" -ErrorAction SilentlyContinue
          if ($hxx) { Write-Host "Headers OK: $($hxx.DirectoryName)" } else { Write-Error "Headers not found!" }
          $lib = Get-ChildItem -Recurse occt-install -Filter "TKernel.lib" -ErrorAction SilentlyContinue
          if ($lib) { Write-Host "Libs OK: $($lib.DirectoryName)" } else { Write-Error "Libs not found!" }
          # Export paths for next steps
          "OCCT_INC=$($hxx.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OCCT_LIB=$($lib.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      # Compile with /MD to match OCCT's default dynamic CRT.
      # OCCT does not set CMAKE_MSVC_RUNTIME_LIBRARY, so CMake uses /MD by default.
      - name: Compile reproducer
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          echo Include: %OCCT_INC%
          echo Lib: %OCCT_LIB%
          cl /std:c++17 /EHsc /MD /I"%OCCT_INC%" Tests\occt_parallel_crash_portable.cpp /Fe:occt_test.exe /link /LIBPATH:"%OCCT_LIB%" TKernel.lib TKMath.lib TKG2d.lib TKG3d.lib TKGeomBase.lib TKBRep.lib TKGeomAlgo.lib TKTopAlgo.lib TKPrim.lib TKBO.lib TKBool.lib TKFillet.lib TKShHealing.lib TKOffset.lib TKMesh.lib Advapi32.lib User32.lib Ws2_32.lib
        shell: cmd

      - name: Run reproducer
        run: |
          echo === Run 1/5 ===
          occt_test.exe 300 10 && echo PASS || echo CRASH
          echo === Run 2/5 ===
          occt_test.exe 300 10 && echo PASS || echo CRASH
          echo === Run 3/5 ===
          occt_test.exe 300 10 && echo PASS || echo CRASH
          echo === Run 4/5 ===
          occt_test.exe 300 10 && echo PASS || echo CRASH
          echo === Run 5/5 ===
          occt_test.exe 300 10 && echo PASS || echo CRASH
          echo Done
        shell: cmd
        continue-on-error: true

  test-macos:
    if: inputs.platform == 'macos' || inputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build OCCT from source
        run: |
          git clone --depth 1 --branch V8_0_0_rc5 https://github.com/Open-Cascade-SAS/OCCT.git occt-src
          mkdir occt-build && cd occt-build
          cmake ../occt-src \
            -DBUILD_LIBRARY_TYPE=Static \
            -DBUILD_MODULE_ApplicationFramework=OFF \
            -DBUILD_MODULE_DataExchange=OFF \
            -DBUILD_MODULE_Draw=OFF \
            -DBUILD_MODULE_FoundationClasses=ON \
            -DBUILD_MODULE_ModelingAlgorithms=ON \
            -DBUILD_MODULE_ModelingData=ON \
            -DBUILD_MODULE_Visualization=OFF \
            -DUSE_FREETYPE=OFF -DUSE_FREEIMAGE=OFF -DUSE_TBB=OFF \
            -DUSE_VTK=OFF -DUSE_OPENGL=OFF -DUSE_GLES2=OFF \
            -DUSE_DRACO=OFF -DUSE_FFMPEG=OFF -DUSE_OPENVR=OFF \
            -DUSE_XLIB=OFF -DUSE_TCL=OFF -DUSE_RAPIDJSON=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/occt-install
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          cmake --install .
        timeout-minutes: 45

      - name: Compile and run reproducer
        run: |
          OCCT_INC=occt-install/include/opencascade
          [ ! -d "$OCCT_INC" ] && OCCT_INC=occt-install/include
          libtool -static -o libocct-all.a occt-install/lib/*.a
          clang++ -std=c++17 -w -I"$OCCT_INC" Tests/occt_parallel_crash_portable.cpp libocct-all.a -lz -lc++ -o occt_test

          crashes=0; passes=0
          for i in 1 2 3 4 5; do
            echo "=== Run $i/5 ==="
            if ./occt_test 300 10; then passes=$((passes+1)); echo "PASS"
            else crashes=$((crashes+1)); echo "CRASH (exit $?)"
            fi
          done
          echo ""; echo "Results: $passes passed, $crashes crashed out of 5 runs"
          [ $crashes -gt 0 ] && echo "::warning::$crashes/5 runs crashed on macOS arm64"
          true
